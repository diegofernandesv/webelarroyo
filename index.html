<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hotel El Arroyo</title>

    <!-- Cloudbeds Immersive Booking Engine 2.0 -->
    <script
      type="text/javascript"
      data-cookieconsent="ignore"
      src="https://static1.cloudbeds.com/booking-engine/latest/static/js/immersive-experience/cb-immersive-experience.js"
    ></script>

    <!-- Cloudbeds widget custom styles -->
    <style data-cb-immersive-experience-root>
      :is(#cb-bookingengine, .cb-bookingengine-root),
      .cb-hotel-picker {
        /* Font */
        * {
          font-family: "SF Pro Display", Inter, -apple-system, BlinkMacSystemFont,
            "Segoe UI", Roboto, Helvetica, sans-serif !important;
        }

        /* Container / search bar wrapper */
        [class*="search-bar"],
        [class*="SearchBar"],
        [class*="date-picker"],
        [class*="DatePicker"],
        [class*="booking-bar"],
        [class*="BookingBar"],
        [class*="widget"],
        [class*="Widget"],
        [class*="container"],
        [class*="Container"] {
          background: rgba(255, 255, 255, 0.92) !important;
          backdrop-filter: blur(12px) !important;
          -webkit-backdrop-filter: blur(12px) !important;
          border-radius: 9999px !important;
          border: none !important;
          box-shadow: 0 8px 32px rgba(18, 39, 61, 0.18) !important;
        }

        /* Labels / field names */
        label,
        [class*="label"],
        [class*="Label"] {
          color: rgba(18, 39, 61, 0.55) !important;
          font-size: 11px !important;
          font-weight: 500 !important;
          letter-spacing: 0.4px !important;
          text-transform: uppercase !important;
        }

        /* Field values / selected text */
        input,
        [class*="value"],
        [class*="Value"],
        [class*="date"],
        [class*="Date"] {
          color: #12273d !important;
          font-weight: 500 !important;
          background: transparent !important;
          border: none !important;
        }

        /* Search / Book button */
        button[type="submit"],
        button[type="button"],
        [class*="search-btn"],
        [class*="SearchBtn"],
        [class*="submit"],
        [class*="Submit"],
        [class*="search-button"],
        [class*="SearchButton"] {
          background-color: #97bbe0 !important;
          color: #12273d !important;
          border-radius: 9999px !important;
          font-weight: 600 !important;
          font-size: 1rem !important;
          border: none !important;
          transition: background-color 0.2s ease, transform 0.2s ease !important;
        }

        button[type="submit"]:hover,
        button[type="button"]:hover,
        [class*="search-button"]:hover {
          background-color: #83a7cc !important;
          transform: translateY(-2px) !important;
        }

        /* Dividers between fields */
        [class*="divider"],
        [class*="Divider"],
        [class*="separator"],
        [class*="Separator"] {
          background-color: rgba(18, 39, 61, 0.12) !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
